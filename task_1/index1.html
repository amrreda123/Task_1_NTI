<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Form</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <section>
        <div class="image-container">
            <img src="doctor.png" alt="Doctor">
        </div>
        
        <div class="form-container">
            <h1>Doctor Appointment Form</h1>
            
            <form action="index2.html" method="POST">
                
                <div class="form-row">
                    <label for="date">Appointment Date</label>
                    <input type="date" id="date" name="date">
                </div>

                <div class="form-row">
                    <label for="time">Appointment Time</label>
                    <input type="time" id="time" name="time">
                </div>

                <div class="form-row">
                    <label>Name</label>
                    <div class="multi-input">
                        <input type="text" id="first_name" name="first_name" placeholder="First">
                        <input type="text" id="last_name" name="last_name" placeholder="Last">
                    </div>
                </div>

                <div class="form-row">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label for="male">Male</label>
                        <input type="radio" id="male" name="gender" value="male">
                        <label for="female">Female</label>
                        <input type="radio" id="female" name="gender" value="female">
                    </div>
                </div>

                <div class="form-row">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="####">
                </div>

                <div class="form-row">
                    <label>Address</label>
                    <div class="multi-input">
                        <input type="text" id="city" name="city" placeholder="city">
                        <input type="text" id="state" name="state" placeholder="state">
                    </div>
                </div>

                <div class="form-row">
                    <label for="query">Your Query</label>
                    <textarea name="query" id="query" cols="30" rows="4"></textarea>
                </div>

                <div class="form-row">
                    <label>Appointment Type</label>
                    <div>
                        <p class="small-text">Select which appointment type(s) you require</p>
                        <div class="checkbox-group">
                            <div>
                                <input type="checkbox" id="cervix" name="appointment_type[]" value="cervix">
                                <label for="cervix">Cervix checkup</label>
                            </div>
                            <div>
                                <input type="checkbox" id="heart" name="appointment_type[]" value="heart">
                                <label for="heart">Heart checkup</label>
                            </div>
                            <div>
                                <input type="checkbox" id="eye" name="appointment_type[]" value="eye">
                                <label for="eye">Eye check-up</label>
                            </div>
                            <div>
                                <input type="checkbox" id="hearing" name="appointment_type[]" value="hearing">
                                <label for="hearing">Hearing Test</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <label></label> <input type="submit" value="Send" class="submit-btn">
                </div>

            </form>
        </div>
    </section>
</body>
</html>
